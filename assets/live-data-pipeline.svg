<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
  <title id="title">WattsEye Live Data Pipeline</title>
  <desc id="desc">Sequential data pipeline from raw sensor readings to dashboard and smart recommendations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, sans-serif; fill: #475569; }
      .step { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .step1 { fill: #ecfeff; stroke: #0891b2; }
      .step2 { fill: #eef2ff; stroke: #4f46e5; }
      .step3 { fill: #fefce8; stroke: #ca8a04; }
      .step4 { fill: #f0fdf4; stroke: #16a34a; }
      .num { font: 700 18px Arial, sans-serif; fill: #fff; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .circle { fill: #334155; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; rx: 8; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="620"/>
  <text class="title" x="58" y="66">Live Data Pipeline</text>
  <text class="sub" x="58" y="98">How real electricity readings become appliance predictions, routine-aware alerts, and user recommendations.</text>

  <g transform="translate(50 160)">
    <rect class="step step1" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">1</text>
    <text class="label" x="20" y="58">Sensors</text>
    <text class="small" x="20" y="80">CT + voltage</text>
  </g>
  <g transform="translate(220 160)">
    <rect class="step step1" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">2</text>
    <text class="label" x="20" y="58">ADC read</text>
    <text class="small" x="20" y="80">ADS1115 values</text>
  </g>
  <g transform="translate(390 160)">
    <rect class="step step1" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">3</text>
    <text class="label" x="20" y="58">Watts</text>
    <text class="small" x="20" y="80">Calibrated power</text>
  </g>
  <g transform="translate(560 160)">
    <rect class="step step2" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">4</text>
    <text class="label" x="20" y="58">Window</text>
    <text class="small" x="20" y="80">Recent sequence</text>
  </g>
  <g transform="translate(730 160)">
    <rect class="step step2" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">5</text>
    <text class="label" x="20" y="58">Normalize</text>
    <text class="small" x="20" y="80">Match training</text>
  </g>
  <g transform="translate(900 160)">
    <rect class="step step2" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">6</text>
    <text class="label" x="20" y="58">TFLite</text>
    <text class="small" x="20" y="80">Appliance models</text>
  </g>
  <g transform="translate(1070 160)">
    <rect class="step step2" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">7</text>
    <text class="label" x="20" y="58">Smooth</text>
    <text class="small" x="20" y="80">Stable prediction</text>
  </g>
  <g transform="translate(1240 160)">
    <rect class="step step3" x="0" y="0" width="150" height="96"/>
    <circle class="circle" cx="24" cy="24" r="16"/><text class="num" x="19" y="30">8</text>
    <text class="label" x="20" y="58">Store</text>
    <text class="small" x="20" y="80">History + context</text>
  </g>

  <path class="line" d="M200 208 L220 208"/>
  <path class="line" d="M370 208 L390 208"/>
  <path class="line" d="M540 208 L560 208"/>
  <path class="line" d="M710 208 L730 208"/>
  <path class="line" d="M880 208 L900 208"/>
  <path class="line" d="M1050 208 L1070 208"/>
  <path class="line" d="M1220 208 L1240 208"/>

  <g transform="translate(250 360)">
    <rect class="step step3" x="0" y="0" width="220" height="110"/>
    <text class="label" x="24" y="36">Smart insight engine</text>
    <text class="small" x="24" y="62">Routine + occupancy</text>
    <text class="small" x="24" y="84">Cost + anomaly context</text>
  </g>
  <g transform="translate(540 360)">
    <rect class="step step4" x="0" y="0" width="190" height="110"/>
    <text class="label" x="24" y="36">Dashboard</text>
    <text class="small" x="24" y="62">Cards, timeline</text>
    <text class="small" x="24" y="84">Forecast + scores</text>
  </g>
  <g transform="translate(790 360)">
    <rect class="step step4" x="0" y="0" width="190" height="110"/>
    <text class="label" x="24" y="36">Alerts</text>
    <text class="small" x="24" y="62">Dashboard first</text>
    <text class="small" x="24" y="84">WhatsApp optional</text>
  </g>
  <g transform="translate(1040 360)">
    <rect class="step step4" x="0" y="0" width="190" height="110"/>
    <text class="label" x="24" y="36">Recommendations</text>
    <text class="small" x="24" y="62">Energy coach</text>
    <text class="small" x="24" y="84">Estimated saving</text>
  </g>

  <path class="line" d="M1315 256 C1315 318 360 318 360 360"/>
  <path class="line" d="M470 415 L540 415"/>
  <path class="line" d="M730 415 L790 415"/>
  <path class="line" d="M980 415 L1040 415"/>

  <rect class="note" x="250" y="520" width="980" height="58"/>
  <text class="small" x="280" y="545">Prototype rule: live sensing and appliance detection should be real where possible.</text>
  <text class="small" x="280" y="565">Routine-aware insights can use stored sample data until enough real history is collected.</text>
</svg>
