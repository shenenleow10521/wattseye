<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">WattsEye Three Pillars Map</title>
  <desc id="desc">Three product pillars: appliance-level insight, smart waste prevention, and appliance health warning.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, sans-serif; fill: #475569; }
      .core { fill: #ffffff; stroke: #334155; stroke-width: 2.5; rx: 12; }
      .pill1 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 12; }
      .pill2 { fill: #fefce8; stroke: #ca8a04; stroke-width: 2.5; rx: 12; }
      .pill3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 12; }
      .label { font: 700 21px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .tag { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1300" height="760"/>
  <text class="title" x="60" y="64">WattsEye Three-Pillar Product Map</text>
  <text class="sub" x="60" y="96">The smarter features still fit inside the original three-pillar pitch.</text>

  <rect class="core" x="385" y="142" width="530" height="118"/>
  <text class="label" x="430" y="184">Core intelligence layer</text>
  <text class="small" x="430" y="214">Power patterns + occupancy + routines + cost history</text>
  <text class="small" x="430" y="238">turn raw readings into useful decisions.</text>

  <path class="line" d="M650 260 L250 340"/>
  <path class="line" d="M650 260 L650 340"/>
  <path class="line" d="M650 260 L1050 340"/>

  <rect class="pill1" x="70" y="340" width="350" height="300"/>
  <text class="label" x="105" y="386">1. Appliance-Level Insight</text>
  <text class="small" x="105" y="420">What is using power?</text>
  <text class="small" x="105" y="444">How much does it cost?</text>
  <text class="small" x="105" y="468">When did it happen?</text>
  <rect class="chip" x="105" y="505" width="190" height="36"/>
  <text class="tag" x="123" y="528">Appliance cards</text>
  <rect class="chip" x="105" y="552" width="190" height="36"/>
  <text class="tag" x="123" y="575">Event timeline</text>
  <rect class="chip" x="105" y="599" width="230" height="36"/>
  <text class="tag" x="123" y="622">Confidence explanation</text>

  <rect class="pill2" x="475" y="340" width="350" height="300"/>
  <text class="label" x="510" y="386">2. Smart Waste Prevention</text>
  <text class="small" x="510" y="420">Is usage unnecessary?</text>
  <text class="small" x="510" y="444">Is it unusual for this routine?</text>
  <text class="small" x="510" y="468">What action saves money?</text>
  <rect class="chip" x="510" y="505" width="180" height="36"/>
  <text class="tag" x="528" y="528">Bill forecast</text>
  <rect class="chip" x="510" y="552" width="170" height="36"/>
  <text class="tag" x="528" y="575">Waste score</text>
  <rect class="chip" x="510" y="599" width="225" height="36"/>
  <text class="tag" x="528" y="622">Energy coach action</text>

  <rect class="pill3" x="880" y="340" width="350" height="300"/>
  <text class="label" x="915" y="386">3. Appliance Health Warning</text>
  <text class="small" x="915" y="420">Is behavior changing?</text>
  <text class="small" x="915" y="444">Is an appliance becoming inefficient?</text>
  <text class="small" x="915" y="468">Should the user check it?</text>
  <rect class="chip" x="915" y="505" width="190" height="36"/>
  <text class="tag" x="933" y="528">Health score</text>
  <rect class="chip" x="915" y="552" width="210" height="36"/>
  <text class="tag" x="933" y="575">Anomaly warning</text>
  <rect class="chip" x="915" y="599" width="205" height="36"/>
  <text class="tag" x="933" y="622">Standby insight</text>

  <rect class="core" x="250" y="680" width="800" height="46"/>
  <text class="small" x="285" y="709">Pitch line: WattsEye learns your home, predicts your bill, finds waste, and warns before appliance problems become expensive.</text>
</svg>
