<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">WattsEye Smart Insight Architecture</title>
  <desc id="desc">Layered architecture showing sensing, appliance AI, context, smart insight engine, and user outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
    </marker>
    <style>
      .bg { fill: #fbfbf8; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .layer-title { font: 700 20px Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #fff; stroke: #d1d5db; stroke-width: 2; rx: 8; }
      .input { fill: #ecfeff; stroke: #0891b2; }
      .ai { fill: #eef2ff; stroke: #4f46e5; }
      .ctx { fill: #f0fdf4; stroke: #16a34a; }
      .engine { fill: #fef3c7; stroke: #d97706; }
      .out { fill: #fff1f2; stroke: #e11d48; }
      .line { stroke: #1e293b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { fill: #f3f4f6; stroke: #e5e7eb; stroke-width: 1.5; rx: 14; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="860"/>
  <text class="title" x="60" y="66">Smart Insight Architecture</text>
  <text class="sub" x="60" y="98">The system is smarter when appliance detection is combined with occupancy, routines, history, and cost context.</text>

  <rect class="soft" x="60" y="138" width="1280" height="110"/>
  <text class="layer-title" x="90" y="176">Layer 1: Data inputs</text>
  <rect class="box input" x="300" y="160" width="190" height="60"/>
  <text class="label" x="320" y="185">Power signal</text>
  <text class="small" x="320" y="206">1 Hz total watts</text>
  <rect class="box input" x="530" y="160" width="190" height="60"/>
  <text class="label" x="550" y="185">Occupancy</text>
  <text class="small" x="550" y="206">mmWave room state</text>
  <rect class="box input" x="760" y="160" width="190" height="60"/>
  <text class="label" x="780" y="185">Timestamp</text>
  <text class="small" x="780" y="206">Hour and day</text>
  <rect class="box input" x="990" y="160" width="190" height="60"/>
  <text class="label" x="1010" y="185">Tariff</text>
  <text class="small" x="1010" y="206">Cost assumptions</text>

  <rect class="soft" x="60" y="282" width="1280" height="120"/>
  <text class="layer-title" x="90" y="326">Layer 2: Appliance AI</text>
  <rect class="box ai" x="300" y="312" width="190" height="64"/>
  <text class="label" x="320" y="337">Kettle model</text>
  <text class="small" x="320" y="358">Sudden high block</text>
  <rect class="box ai" x="530" y="312" width="190" height="64"/>
  <text class="label" x="550" y="337">AC model</text>
  <text class="small" x="550" y="358">Long cycle pattern</text>
  <rect class="box ai" x="760" y="312" width="190" height="64"/>
  <text class="label" x="780" y="337">Fridge model</text>
  <text class="small" x="780" y="358">Repeated cycling</text>
  <rect class="box ai" x="990" y="312" width="190" height="64"/>
  <text class="label" x="1010" y="337">Other models</text>
  <text class="small" x="1010" y="358">Washer, lamp, fan</text>

  <rect class="soft" x="60" y="436" width="1280" height="120"/>
  <text class="layer-title" x="90" y="480">Layer 3: Context memory</text>
  <rect class="box ctx" x="300" y="466" width="220" height="64"/>
  <text class="label" x="320" y="491">Routine baseline</text>
  <text class="small" x="320" y="512">Normal hour/day behavior</text>
  <rect class="box ctx" x="570" y="466" width="220" height="64"/>
  <text class="label" x="590" y="491">Cost history</text>
  <text class="small" x="590" y="512">Daily and monthly usage</text>
  <rect class="box ctx" x="840" y="466" width="220" height="64"/>
  <text class="label" x="860" y="491">Health baseline</text>
  <text class="small" x="860" y="512">Normal appliance behavior</text>

  <rect class="soft" x="60" y="590" width="1280" height="118"/>
  <text class="layer-title" x="90" y="635">Layer 4: Smart insight engine</text>
  <rect class="box engine" x="300" y="616" width="880" height="66"/>
  <text class="label" x="330" y="642">Decision logic</text>
  <text class="small" x="330" y="664">Compare live appliance predictions with occupancy, routines, cost trend, and health baseline.</text>

  <rect class="soft" x="60" y="742" width="1280" height="88"/>
  <text class="layer-title" x="90" y="794">Layer 5: User outputs</text>
  <rect class="box out" x="300" y="758" width="190" height="52"/>
  <text class="label" x="320" y="790">Bill forecast</text>
  <rect class="box out" x="530" y="758" width="190" height="52"/>
  <text class="label" x="550" y="790">Waste score</text>
  <rect class="box out" x="760" y="758" width="190" height="52"/>
  <text class="label" x="780" y="790">Energy coach</text>
  <rect class="box out" x="990" y="758" width="190" height="52"/>
  <text class="label" x="1010" y="790">Health warning</text>

  <path class="line" d="M395 220 L395 312"/>
  <path class="line" d="M625 220 L625 312"/>
  <path class="line" d="M855 220 L855 312"/>
  <path class="line" d="M1090 220 L1090 312"/>
  <path class="line" d="M395 376 C395 420 410 430 410 466"/>
  <path class="line" d="M625 376 C625 420 680 430 680 466"/>
  <path class="line" d="M855 376 C855 420 950 430 950 466"/>
  <path class="line" d="M410 530 C410 570 520 590 640 616"/>
  <path class="line" d="M680 530 L700 616"/>
  <path class="line" d="M950 530 C950 570 880 590 820 616"/>
  <path class="line" d="M740 682 L740 758"/>
</svg>
