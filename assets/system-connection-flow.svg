<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">WattsEye System Connection Flow</title>
  <desc id="desc">End-to-end flow from appliance power changes through sensing, edge intelligence, dashboard, alerts, and control.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .sensor { fill: #ecfeff; stroke: #06b6d4; }
      .compute { fill: #eef2ff; stroke: #6366f1; }
      .control { fill: #f0fdf4; stroke: #22c55e; }
      .user { fill: #fff7ed; stroke: #f97316; }
      .insight { fill: #fefce8; stroke: #eab308; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .band { fill: #e2e8f0; opacity: 0.42; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="60" y="64">WattsEye System Connection Flow</text>
  <text class="subtitle" x="60" y="96">One main power signal becomes appliance insight, routine-aware decisions, user alerts, and optional AC control.</text>

  <rect class="band" x="40" y="132" width="300" height="610" rx="14"/>
  <rect class="band" x="370" y="132" width="290" height="610" rx="14"/>
  <rect class="band" x="690" y="132" width="330" height="610" rx="14"/>
  <rect class="band" x="1050" y="132" width="310" height="610" rx="14"/>
  <text class="label" x="70" y="166">Electrical sensing</text>
  <text class="label" x="400" y="166">Edge computer</text>
  <text class="label" x="720" y="166">Smart insight layer</text>
  <text class="label" x="1080" y="166">User action</text>

  <rect class="box sensor" x="70" y="205" width="230" height="86"/>
  <text class="label" x="92" y="240">Appliance turns on</text>
  <text class="small" x="92" y="264">Total current changes</text>

  <rect class="box sensor" x="70" y="330" width="230" height="96"/>
  <text class="label" x="92" y="365">CT clamp + voltage</text>
  <text class="small" x="92" y="389">Measure main power</text>
  <text class="tiny" x="92" y="410">No smart plug per appliance</text>

  <rect class="box sensor" x="70" y="470" width="230" height="96"/>
  <text class="label" x="92" y="505">ADS1115 ADC</text>
  <text class="small" x="92" y="529">Analog to digital</text>
  <text class="tiny" x="92" y="550">Raw readings to Raspberry Pi</text>

  <rect class="box compute" x="400" y="205" width="230" height="86"/>
  <text class="label" x="422" y="240">Raspberry Pi</text>
  <text class="small" x="422" y="264">Calculate watts</text>

  <rect class="box compute" x="400" y="330" width="230" height="96"/>
  <text class="label" x="422" y="365">Rolling window</text>
  <text class="small" x="422" y="389">Recent power sequence</text>
  <text class="tiny" x="422" y="410">Prepared for TFLite models</text>

  <rect class="box compute" x="400" y="470" width="230" height="96"/>
  <text class="label" x="422" y="505">Appliance ML</text>
  <text class="small" x="422" y="529">Kettle, AC, fridge...</text>
  <text class="tiny" x="422" y="550">Estimated appliance power</text>

  <rect class="box control" x="400" y="610" width="230" height="86"/>
  <text class="label" x="422" y="645">ESP32 + mmWave</text>
  <text class="small" x="422" y="669">Room occupancy</text>

  <rect class="box insight" x="720" y="205" width="260" height="86"/>
  <text class="label" x="742" y="240">Local history</text>
  <text class="small" x="742" y="264">Power, predictions, occupancy</text>

  <rect class="box insight" x="720" y="330" width="260" height="96"/>
  <text class="label" x="742" y="365">Routine context</text>
  <text class="small" x="742" y="389">Normal time/day behavior</text>
  <text class="tiny" x="742" y="410">Learns this home</text>

  <rect class="box insight" x="720" y="470" width="260" height="96"/>
  <text class="label" x="742" y="505">Insight engine</text>
  <text class="small" x="742" y="529">Forecasts, waste, health</text>
  <text class="tiny" x="742" y="550">Recommends action</text>

  <rect class="box user" x="1080" y="205" width="240" height="96"/>
  <text class="label" x="1102" y="240">Dashboard</text>
  <text class="small" x="1102" y="264">Usage, cost, timeline</text>
  <text class="tiny" x="1102" y="285">Smart insight cards</text>

  <rect class="box user" x="1080" y="350" width="240" height="96"/>
  <text class="label" x="1102" y="385">Alert decision</text>
  <text class="small" x="1102" y="409">Dashboard first</text>
  <text class="tiny" x="1102" y="430">WhatsApp optional</text>

  <rect class="box control" x="1080" y="500" width="240" height="96"/>
  <text class="label" x="1102" y="535">Optional AC control</text>
  <text class="small" x="1102" y="559">MQTT to ESP32</text>
  <text class="tiny" x="1102" y="580">IR OFF command</text>

  <path class="line" d="M185 291 L185 330"/>
  <path class="line" d="M185 426 L185 470"/>
  <path class="line" d="M300 518 C335 518 350 248 400 248"/>
  <path class="line" d="M515 291 L515 330"/>
  <path class="line" d="M515 426 L515 470"/>
  <path class="line" d="M630 518 C670 518 675 248 720 248"/>
  <path class="line" d="M630 518 C675 518 675 378 720 378"/>
  <path class="dash" d="M630 653 C675 653 675 520 720 520"/>
  <path class="line" d="M850 291 L850 330"/>
  <path class="line" d="M850 426 L850 470"/>
  <path class="line" d="M980 520 C1025 520 1035 253 1080 253"/>
  <path class="line" d="M980 520 C1025 520 1035 398 1080 398"/>
  <path class="dash" d="M1200 446 L1200 500"/>

  <rect class="box" x="500" y="735" width="430" height="52"/>
  <text class="small" x="525" y="758">Core value: one sensor creates appliance-level insight.</text>
  <text class="small" x="525" y="778">Smart value: routines, forecasts, scores, and recommendations turn insight into action.</text>
</svg>
